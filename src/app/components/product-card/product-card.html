<div class = "relative bg-white cursor-pointer rounded-xl shadow-lg overflow-hidden flex flex-col h-full">
    <div class="relative">
        <img [src]="product().imageUrl" class = "w-full h-[300px] object-cover rounded-t-xl" [routerLink]="['/product', product().id]"/>
        <ng-content/>
    </div>
    <div class = "p-5 flex flex-col flex-1">
        <h3 class = "text-lg font-semibold text-gray-900 mb-2 leading-tight" [routerLink]="['/product', product().id]">{{ product().name }}</h3>
        <p class = "text-sm text-gray-600 mb-4 flex-1 leading-relaxed">{{ product().description }}</p>
        <!-- add reting component-->
        <div class="text-sm font-medium mb-4" [ngClass]="product().inStock ? 'text-green-600' : 'text-red-600'">
            {{ product().inStock ? 'In Stock' : 'Out of Stock' }}
        </div>
        <div class = "flex items-center justify-between mt-auto">
            <span class = "text-2xl font-bold text-gray-900">${{ product().price }}</span>
            <button matButton = "filled" class = "flex items-center gap-2" [disabled]="!product().inStock"
            (click)="store.addToCart(product())">
                <mat-icon>shopping_cart</mat-icon>
                Add to Cart
            </button>
        </div>
    </div>
</div>
