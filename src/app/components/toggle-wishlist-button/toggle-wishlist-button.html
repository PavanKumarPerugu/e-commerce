<button 
  class="w-10 h-10 rounded-full border flex items-center justify-center cursor-pointer transition-all duration-200 hover:scale-110"
  [ngClass]="isInWishlist() ? '!text-red-500':'!text-gray-400'"
  matIconButton 
  (click)="toggleWishlist(product())"
>
  <mat-icon>
    {{ isInWishlist() ? 'favorite' : 'favorite_border' }}
  </mat-icon>
</button>
