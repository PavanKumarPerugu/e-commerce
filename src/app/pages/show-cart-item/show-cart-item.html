<div class="grid grid-cols-[3fr_1fr_1fr]">
    <div class="flex items-center gap-4">
        <img [src]="item().product.imageUrl" class="w-24 h-24 rounded-lg object-cover" [style.view-transition-name]="'product-image-' + item().product.id"/>
        <div>
            <div><h3 class="text-lg font-semibold">{{ item().product.name }}</h3></div>
            <div><p class="text-gray-600">${{ item().product.price.toFixed(2) }}</p></div>
        </div>
    </div>
    <app-qty-selector [quantity]="item().quantity" (qtyUpdated)="store.setItemQuantity({ productId: item().product.id, quantity: $event })"/>
    <div class="flex flex-col items-end">
        <div class="text-right text-lg font-semibold">
            ${{ total() }}
        </div>
        <div class="flex -me-3">
            <button matIconButton (click)="store.moveTowishlist(item().product)">
                <mat-icon>favorite_border</mat-icon>
            </button>
            <button matIconButton class="danger" (click)="store.removeFromCart(item().product)">
                <mat-icon>delete</mat-icon>
            </button>
        </div>
    </div>
</div>
