<div class="text-xs rounded-md bg-gray-100 px-2 py-1 w-fit mb-2">
    {{ product().category | titlecase }}
</div>
<h1 class="text-2xl font-extrabold mb-3">{{ product().name }}</h1>
<p class="text-3xl font-semibold mb-4">${{ product().price }}</p>
<app-stock-status [inStock]="product().inStock" class="mb-4"/>
<p class="font-semibold mb-2">Description</p>
<p class="text-gray-600 border-b border-gray-200 pb-4 mb-6">{{ product().longDescription }}</p>
<div class="flex items-center gap-2 mb-3 pt-4">
    <span class="font-semibold">Quantity:</span>
    <app-qty-selector [quantity]="quantity()" (qtyUpdated)="quantity.set($event)"/>
</div>
<div class="flex gap-4 mb border-b border-gray-200 pb-4">
    <button matButton="filled" class="w-2/3 flex items-center gap-2" (click)="store.addToCart(product(), quantity())" [disabled]="!product().inStock" [routerLink]="['/checkout']">
        <mat-icon>payment</mat-icon>
        {{product().inStock ? 'Buy Now' : 'Buy Later'}}
    </button>
    <button matButton="filled" class="w-2/3 flex items-center gap-2" (click)="store.addToCart(product(), quantity())" [disabled]="!product().inStock" >
        <mat-icon>shopping_cart</mat-icon>
        {{product().inStock ? 'Add to Cart' : 'Out of Stock'}}
    </button>
    <app-toggle-wishlist-button [product]="product()"/>
    <button matIconButton>
        <mat-icon>share</mat-icon>
    </button>
</div>
