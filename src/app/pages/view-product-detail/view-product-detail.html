<div class="mx-auto max-w-[1200px] py-6">
    <app-back-button class="mb-6" [navigateTo]="backRoute()">Continue Shopping</app-back-button>
    <p class="text-3xl font-bold mb-4">{{ store.selectedProduct()?.name }}</p>
    @if (store.selectedProduct(); as product) {
        <div class="flex gap-8 mb-8">
            <img [src]="product.imageUrl"class="w-[500px] h-[550px] object-cover rounded-lg" alt="{{ product.name }}" [style.view-transition-name]="'product-image-' + product.id"/>
            <div>
                <app-product-info [product]="product"/>
            </div>
        </div>
    }
</div>
