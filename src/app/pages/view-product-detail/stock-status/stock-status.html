@if (inStock()) {
    <div class="flex items-center gap-2 border border-green-700 rounded-lg px-3 py-3 bg-whitew-full mb-4">
        <mat-icon class="small text-green-700">check_circle</mat-icon>
        <span class="text-xs text-green-800">In Stock and Ready for Shipping</span>
    </div>
} @else {
    <div class="flex items-center gap-2 border border-red-700 rounded-lg px-3 py-3 bg-white w-full danger mb-4">
        <mat-icon class="small">warning</mat-icon>
        <span class="text-xs">This item is out of stock. Add it to your wishlist to be notified when it's available.</span>
    </div>
}
